name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test-suite:
    name: Static Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Make scripts executable
        run: chmod +x scripts/run_test_suite.sh eval/*.sh

      - name: Run static test suites (permissions, security, changeling)
        run: ./scripts/run_test_suite.sh

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: logs/test-reports/
          retention-days: 30
